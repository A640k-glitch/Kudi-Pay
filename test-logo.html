<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;900&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Plus Jakarta Sans';
      src: local('Arial');
    }
    body { margin: 0; background-color: #FDFBF7; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .font-display { font-family: 'Outfit', sans-serif; }
  </style>
</head>
<body>
  <div id="logo-container" class="flex items-center gap-6 select-none" style="transform: scale(4); transform-origin: center;">
    <div class="relative w-16 h-16 shrink-0">
      <div class="absolute inset-0 bg-[#FF6666] border-[4px] border-black translate-x-2 translate-y-2"></div>
      <div class="absolute inset-0 bg-[#E0FF4F] border-[4px] border-black flex items-center justify-center font-black text-black text-3xl font-sans">
        K
      </div>
    </div>
    <span class="font-display font-black text-7xl tracking-tighter uppercase text-black"
          style="-webkit-text-stroke: 2px black; text-shadow: 5px 5px 0px rgba(255,102,102,1);">
      kudi
    </span>
  </div>
</body>
</html>
