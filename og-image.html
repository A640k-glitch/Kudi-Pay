<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background-color: #FDFBF7; display: flex; align-items: center; justify-content: center; height: 100vh; }
  </style>
</head>
<body>
  <div style="display: flex; align-items: center; gap: 48px; user-select: none;">
    <!-- Box -->
    <div style="position: relative; width: 240px; height: 240px; flex-shrink: 0;">
      <!-- Red Box -->
      <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: #FF6666; border: 18px solid black; transform: translate(24px, 24px); box-sizing: border-box;"></div>
      <!-- Green Box -->
      <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: #E0FF4F; border: 18px solid black; display: flex; align-items: center; justify-content: center; font-family: Arial, sans-serif; font-weight: 900; font-size: 140px; color: black; box-sizing: border-box; margin: 0; padding: 0;">
        <span style="line-height: 1; transform: translateY(4px);">K</span>
      </div>
    </div>
    <!-- Text -->
    <span style="font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 180px; letter-spacing: -0.05em; text-transform: uppercase; color: black; -webkit-text-stroke: 6px black; text-shadow: 18px 18px 0px rgba(255,102,102,1); margin-top: 10px;">
      kudi
    </span>
  </div>
</body>
</html>
